{% extends 'base.html' %}

{% block title %}Login - Perfume World{% endblock %}

{% block extra_css %}
<style>
    .auth-box {
        max-width: 450px;
        margin: 60px auto;
        border: 1px solid var(--border-color);
        padding: 40px;
        border-radius: 4px;
        background-color: var(--white);
        box-shadow: var(--shadow);
        border-top: 4px solid var(--secondary);
    }

    .auth-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 14px;
        outline: none;
        transition: var(--transition);
    }

    .form-group input:focus {
        border-color: var(--secondary);
    }

    .btn-auth {
        width: 100%;
        padding: 14px;
        background-color: var(--primary);
        color: var(--white);
        border: none;
        border-radius: 4px;
        font-weight: 700;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 10px;
    }

    .btn-auth:hover {
        background-color: var(--secondary);
        color: var(--primary);
    }

    .auth-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 13px;
        color: var(--text-muted);
    }

    .auth-footer a {
        color: var(--secondary-dark);
        font-weight: 600;
    }

    .auth-footer a:hover {
        color: var(--primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-box">
        <h2 class="auth-title">Log In</h2>
        
        <form action="{% url 'store:login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-auth">Log In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'store:register' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">Register Here</a>
        </div>
    </div>
</div>
{% endblock %}
